name: Deploy Admin Panel → Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Package build
        run: tar czf /tmp/admin-dist.tar.gz -C dist .

      - name: Upload to Hostinger
        run: |
          scp -P ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_ed25519 \
            /tmp/admin-dist.tar.gz \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/tmp/admin-dist.tar.gz

      - name: Deploy on server
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_ed25519 \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'ENDSSH'
          set -e
          TARGET="$HOME/domains/atlas.aliuntravelsrl.com/public_html"
          
          # Limpiar solo assets compilados (index.html + /assets/) — no tocar subdirectorios con permisos restringidos
          rm -f "$TARGET/index.html"
          rm -rf "$TARGET/assets"
          
          # Extraer nuevo build
          tar xzf /tmp/admin-dist.tar.gz -C "$TARGET"
          
          # Limpiar archivo temporal
          rm -f /tmp/admin-dist.tar.gz
          
          echo "✅ Deploy completado: atlas.aliuntravelsrl.com"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
